<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalles de Pedido</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        /* 🌊 FONDO ANIMADO INTEGRAL */
        body {
            margin: 0;
            padding: 40px;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: linear-gradient(270deg, #0f172a, #1e293b, #0f172a);
            background-size: 600% 600%;
            animation: gradientMove 12s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Luces de fondo decorativas */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }
        body::before { background: #3b82f6; top: -100px; left: -100px; }
        body::after { background: #06b6d4; bottom: -100px; right: -100px; }

        .titulo {
            text-align: center;
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* 💎 TABLA GLASSMORPHISM */
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow-x: auto;
        }

        /* 🔘 BOTONES */
        .btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-nuevo {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            margin-bottom: 20px;
        }

        .btn-editar {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            font-size: 13px;
        }

        .btn-eliminar {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-size: 13px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            filter: brightness(1.2);
        }

        /* 📊 ESTILO DE TABLA */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5f5;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Detalles específicos */
        .badge-id {
            color: #06b6d4;
            font-weight: 600;
        }

        .qty-circle {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .price-text {
            color: #4ade80;
            font-weight: 600;
        }

        .actions-cell {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h1 class="titulo">Desglose de Pedidos</h1>

<div style="max-width: 1200px; margin: 0 auto;">

    <a th:href="@{/detalle-pedidos/nuevo}" class="btn btn-nuevo">
        <span class="material-icons">add_circle_outline</span> Nuevo Detalle
    </a>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>P. Unitario</th>
                <th>Pedido Ref.</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="detalle : ${detalles}">
                <td class="badge-id" th:text="${detalle.idDetalle}"></td>
                <td>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="material-icons" style="font-size: 18px; color: #3b82f6;">inventory_2</span>
                        <span th:text="${detalle.producto.nombreProducto}"></span>
                    </div>
                </td>
                <td>
                    <span class="qty-circle" th:text="${detalle.cantidad} + ' unidades'"></span>
                </td>
                <td class="price-text" th:text="'$' + ${detalle.precioUnitario}"></td>
                <td>
                    <div style="display: flex; align-items: center; gap: 6px; color: #cbd5f5;">
                        <span class="material-icons" style="font-size: 16px;">receipt</span>
                        <span th:text="'#' + ${detalle.pedido.idPedido}"></span>
                    </div>
                </td>

                <td class="actions-cell">
                    <a th:href="@{/detalle-pedidos/editar/{id}(id=${detalle.idDetalle})}"
                       class="btn btn-editar" title="Editar">
                        <span class="material-icons">edit</span>
                    </a>

                    <a th:href="@{/detalle-pedidos/eliminar/{id}(id=${detalle.idDetalle})}"
                       class="btn btn-eliminar"
                       onclick="return confirm('¿Seguro que deseas eliminar este detalle?');" title="Eliminar">
                        <span class="material-icons">delete</span>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <br>
    <a th:href="@{/home}" class="btn btn-back">
        <span class="material-icons">home</span> Volver al Inicio
    </a>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        /* 🌊 FONDO ANIMADO (Consistente con todo el sistema) */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: linear-gradient(270deg, #0f172a, #1e293b, #0f172a);
            background-size: 600% 600%;
            animation: gradientMove 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Luces decorativas */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }
        body::before { background: #3b82f6; top: -100px; left: -100px; }
        body::after { background: #06b6d4; bottom: -100px; right: -100px; }

        /* 💎 CAJA DE REGISTRO (Glassmorphism) */
        .box {
            width: 100%;
            max-width: 380px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 {
            margin: 0 0 10px 0;
            font-weight: 600;
            font-size: 28px;
        }

        p.subtitle {
            font-size: 14px;
            color: #cbd5f5;
            margin-bottom: 25px;
        }

        /* ✉️ MENSAJES */
        .msg {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        /* ⌨️ INPUTS */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group span {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 20px;
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        /* 🔘 BOTÓN */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        /* ENLACE INFERIOR */
        .footer-link {
            display: block;
            margin-top: 25px;
            text-decoration: none;
            color: #cbd5f5;
            font-size: 14px;
            transition: 0.3s;
        }

        .footer-link:hover {
            color: white;
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="box">

    <h2>Registro</h2>
    <p class="subtitle">Crea una cuenta para acceder</p>

    <div class="msg" th:if="${mensaje}" th:text="${mensaje}"></div>

    <form th:action="@{/register}" method="post">

        <div class="input-group">
            <span class="material-icons">person</span>
            <input type="text" name="username" placeholder="Usuario" required>
        </div>

        <div class="input-group">
            <span class="material-icons">lock</span>
            <input type="password" name="password" placeholder="Contraseña" required>
        </div>

        <button type="submit">Registrarse ahora</button>

    </form>

    <a class="footer-link" th:href="@{/login}">Ya tengo cuenta, iniciar sesión</a>

</div>

</body>
</html>

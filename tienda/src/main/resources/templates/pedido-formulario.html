<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modeEdicion} ? 'Editar Pedido' : 'Nuevo Pedido'"></title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        /* 🌊 FONDO ANIMADO */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: linear-gradient(270deg, #0f172a, #1e293b, #0f172a);
            background-size: 600% 600%;
            animation: gradientMove 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Luces de fondo decorativas */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }
        body::before { background: #3b82f6; top: -100px; left: -100px; }
        body::after { background: #06b6d4; bottom: -100px; right: -100px; }

        /* 💎 TARJETA GLASSMORPHISM */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #fff;
        }

        /* 📝 CAMPOS DE FORMULARIO */
        .campo {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 400;
            color: #cbd5f5;
            margin-left: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        /* Estilo especial para el input de fecha y select */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1); /* Hace que el icono del calendario sea blanco */
            cursor: pointer;
        }

        select option {
            background-color: #1e293b;
            color: white;
        }

        input:focus, select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        /* ⚠️ ERRORES */
        .error {
            color: #f87171;
            font-size: 13px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 5px;
        }

        /* 🔘 ACCIONES */
        .acciones {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-guardar {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-guardar:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        .btn-cancelar {
            background: transparent;
            color: #cbd5f5;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-cancelar:hover {
            color: white;
        }

    </style>
</head>

<body>

<div class="container">

    <h1 th:text="${modeEdicion} ? 'Editar Pedido' : 'Nuevo Pedido'"></h1>

    <form th:action="${modeEdicion} ? @{/pedidos/actualizar} : @{/pedidos/guardar}"
          th:object="${pedido}"
          method="post">

        <input type="hidden" th:field="*{idPedido}" />

        <div class="campo">
            <label>Fecha de la Transacción</label>
            <input type="date" th:field="*{fechaPedido}">
            <div class="error" th:if="${#fields.hasErrors('fechaPedido')}">
                <span class="material-icons" style="font-size: 16px;">error_outline</span>
                <span th:errors="*{fechaPedido}"></span>
            </div>
        </div>

        <div class="campo">
            <label>Monto Total ($)</label>
            <input type="number" step="0.01" th:field="*{totalPedido}" placeholder="0.00">
            <div class="error" th:if="${#fields.hasErrors('totalPedido')}">
                <span class="material-icons" style="font-size: 16px;">error_outline</span>
                <span th:errors="*{totalPedido}"></span>
            </div>
        </div>

        <div class="campo">
            <label>Cliente / Usuario Responsable</label>
            <select th:field="*{usuario}">
                <option value="" disabled selected>-- Seleccione un usuario --</option>
                <option th:each="u : ${usuarios}"
                        th:value="${u.idUsuario}"
                        th:text="${u.nombreUsuario}">
                </option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('usuario')}">
                <span class="material-icons" style="font-size: 16px;">error_outline</span>
                <span th:errors="*{usuario}"></span>
            </div>
        </div>

        <div class="acciones">
            <button type="submit" class="btn btn-guardar">
                <span class="material-icons">check_circle</span>
                <span th:text="${modeEdicion} ? 'Actualizar Pedido' : 'Registrar Pedido'"></span>
            </button>

            <a th:href="@{/pedidos}" class="btn-cancelar">Cancelar operación</a>
        </div>

    </form>

</div>

</body>
</html>

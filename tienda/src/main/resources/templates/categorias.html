<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Categorías</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        /* 🌊 FONDO ANIMADO + LUCES (Igual al resto del sistema) */
        body {
            margin: 0;
            padding: 40px;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: linear-gradient(270deg, #0f172a, #1e293b, #0f172a);
            background-size: 600% 600%;
            animation: gradientMove 12s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* luces decorativas */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }
        body::before { background: #3b82f6; top: -100px; left: -100px; }
        body::after { background: #06b6d4; bottom: -100px; right: -100px; }

        .titulo {
            text-align: center;
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* 💎 CONTENEDOR TIPO GLASS */
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* 🔘 BOTONES */
        .btn {
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-nuevo {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(59,130,246,0.3);
        }

        .btn-editar {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 8px 14px;
            font-size: 14px;
        }

        .btn-eliminar {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 14px;
            font-size: 14px;
            margin-left: 5px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            filter: brightness(1.2);
        }

        /* 📊 TABLA ESTILIZADA */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5f5;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1.5px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Descripción sutil */
        .desc-text {
            color: #cbd5f5;
            font-style: italic;
            font-weight: 300;
        }

        .actions-cell {
            display: flex;
            justify-content: center;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-top: 30px;
        }

    </style>
</head>

<body>

<h1 class="titulo">Gestión de Categorías</h1>

<div style="max-width: 1100px; margin: 0 auto;">

    <a th:href="@{/categorias/nuevo}" class="btn btn-nuevo">
        <span class="material-icons">add_circle</span> Nueva Categoría
    </a>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre de Categoría</th>
                <th>Descripción</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="categoria : ${categorias}">
                <td th:text="${categoria.idCategoria}" style="font-weight: 600; color: #06b6d4;"></td>
                <td>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="material-icons" style="color: #3b82f6; font-size: 20px;">category</span>
                        <span th:text="${categoria.nombreCategoria}" style="font-weight: 600;"></span>
                    </div>
                </td>
                <td class="desc-text" th:text="${categoria.descripcionCategoria}"></td>
                <td class="actions-cell">
                    <a th:href="@{/categorias/editar/{id}(id=${categoria.idCategoria})}"
                       class="btn btn-editar">
                        <span class="material-icons" style="font-size: 18px;">edit</span> Editar
                    </a>

                    <a th:href="@{/categorias/eliminar/{id}(id=${categoria.idCategoria})}"
                       class="btn btn-eliminar"
                       onclick="return confirm('¿Seguro que deseas eliminar esta categoría?');">
                        <span class="material-icons" style="font-size: 18px;">delete</span> Eliminar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <br>
    <a th:href="@{/home}" class="btn btn-back">
        <span class="material-icons">home</span> Volver al Inicio
    </a>
</div>

</body>
</html>

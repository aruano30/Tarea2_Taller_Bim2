<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modeEdicion} ? 'Editar Detalle' : 'Nuevo Detalle'"></title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        /* 🌊 FONDO ANIMADO UNIFICADO */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: linear-gradient(270deg, #0f172a, #1e293b, #0f172a);
            background-size: 600% 600%;
            animation: gradientMove 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Luces decorativas */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }
        body::before { background: #3b82f6; top: -100px; left: -100px; }
        body::after { background: #06b6d4; bottom: -100px; right: -100px; }

        /* 💎 CONTENEDOR GLASSMORPHISM */
        .container {
            width: 100%;
            max-width: 520px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        /* 📝 CAMPOS */
        .campo {
            margin-bottom: 18px;
            text-align: left;
        }

        .grid-campos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5f5;
            margin-left: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        /* Estilo para que el select se vea bien en fondo oscuro */
        select option {
            background-color: #1e293b;
            color: white;
        }

        input:focus, select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        /* ⚠️ ERRORES */
        .error {
            color: #f87171;
            font-size: 12px;
            margin-top: 5px;
            margin-left: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 🔘 ACCIONES */
        .acciones {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-guardar {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-guardar:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        .btn-cancelar {
            background: transparent;
            color: #cbd5f5;
            text-decoration: none;
            text-align: center;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-cancelar:hover {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h1 th:text="${modeEdicion} ? 'Editar Detalle de Pedido' : 'Nuevo Detalle de Pedido'"></h1>

    <form th:action="${modeEdicion} ? @{/detalle-pedidos/actualizar} : @{/detalle-pedidos/guardar}"
          th:object="${detalle}"
          method="post">

        <input type="hidden" th:field="*{idDetalle}" />

        <div class="grid-campos">
            <div class="campo">
                <label>Cantidad</label>
                <input type="number" th:field="*{cantidad}" placeholder="0">
                <div class="error" th:if="${#fields.hasErrors('cantidad')}" th:errors="*{cantidad}"></div>
            </div>

            <div class="campo">
                <label>Precio Unitario</label>
                <input type="number" step="0.01" th:field="*{precioUnitario}" placeholder="0.00">
                <div class="error" th:if="${#fields.hasErrors('precioUnitario')}" th:errors="*{precioUnitario}"></div>
            </div>
        </div>

        <div class="campo">
            <label>ID del Pedido</label>
            <select th:field="*{pedido}">
                <option value="" disabled selected>-- Seleccione un pedido --</option>
                <option th:each="p : ${pedidos}"
                        th:value="${p.idPedido}"
                        th:text="'Pedido #' + ${p.idPedido}">
                </option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('pedido')}" th:errors="*{pedido}"></div>
        </div>

        <div class="campo">
            <label>Producto</label>
            <select th:field="*{producto}">
                <option value="" disabled selected>-- Seleccione un producto --</option>
                <option th:each="prod : ${productos}"
                        th:value="${prod.idProducto}"
                        th:text="${prod.nombreProducto}">
                </option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('producto')}" th:errors="*{producto}"></div>
        </div>

        <div class="acciones">
            <button type="submit" class="btn btn-guardar">
                <span class="material-icons">save</span>
                <span th:text="${modeEdicion} ? 'Actualizar Detalle' : 'Guardar Detalle'"></span>
            </button>

            <a th:href="@{/detalle-pedidos}" class="btn-cancelar">Cancelar y volver a la lista</a>
        </div>

    </form>

</div>

</body>
</html>
